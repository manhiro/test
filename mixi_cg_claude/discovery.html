<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Discovery</title>
<style>
:root {
  --bg:#0c0c10; --s1:#16161e; --s2:#1e1e28; --border:#2a2a38;
  --text:#e2e2ec; --muted:#6a6a88; --accent:#7c6af7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Sans','Yu Gothic',system-ui,sans-serif;min-height:100vh}

/* ── Header ── */
header{position:sticky;top:0;z-index:100;background:rgba(12,12,16,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:14px}
.logo{font-size:13px;font-weight:800;letter-spacing:.03em;white-space:nowrap}
.logo em{color:var(--accent);font-style:normal}
.filters{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1}
.filters::-webkit-scrollbar{display:none}
.fb{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px}
.fb:hover,.fb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.fb .fi{font-size:12px}

/* ── Grid ── */
.feed{padding:18px 14px;columns:270px;column-gap:12px;max-width:1600px;margin:0 auto}

/* ── Card ── */
.card{break-inside:avoid;background:var(--s1);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:default}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(124,106,247,.18);border-color:rgba(124,106,247,.5)}

/* Card header band */
.ch{padding:14px 14px 10px;display:flex;align-items:flex-start;gap:10px}
.icon-wrap{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ch-right{flex:1;min-width:0}
.cat-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.card-title{font-size:13px;font-weight:700;line-height:1.35;color:var(--text)}

/* Gradient icon backgrounds per category */
.ic-cmd    {background:linear-gradient(135deg,#312e81,#4f46e5)}
.ic-hook   {background:linear-gradient(135deg,#78350f,#d97706)}
.ic-mcp    {background:linear-gradient(135deg,#0c4a6e,#0891b2)}
.ic-memory {background:linear-gradient(135deg,#14532d,#16a34a)}
.ic-cg     {background:linear-gradient(135deg,#581c87,#9333ea)}
.ic-design {background:linear-gradient(135deg,#881337,#db2777)}
.ic-tips   {background:linear-gradient(135deg,#713f12,#ca8a04)}
.ic-agent  {background:linear-gradient(135deg,#7f1d1d,#dc2626)}

.cl-cmd    {color:#818cf8}
.cl-hook   {color:#fbbf24}
.cl-mcp    {color:#22d3ee}
.cl-memory {color:#4ade80}
.cl-cg     {color:#c084fc}
.cl-design {color:#f472b6}
.cl-tips   {color:#fde047}
.cl-agent  {color:#f87171}

/* Divider */
.cd{height:1px;background:var(--border);margin:0 14px}

/* Card body */
.cb{padding:10px 14px 12px}
.desc{font-size:11.5px;color:var(--muted);line-height:1.65;margin-bottom:10px}

/* Code */
.code{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:10px;color:#93c5fd;white-space:pre;overflow-x:auto;line-height:1.55;margin-bottom:10px}

/* Bullets */
.blist{list-style:none;margin-bottom:10px}
.blist li{font-size:11.5px;color:var(--muted);padding:2px 0 2px 13px;position:relative;line-height:1.55}
.blist li::before{content:'›';position:absolute;left:0;color:var(--accent)}

/* Impact row */
.impacts{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.imp{font-size:10px;padding:2px 8px;border-radius:7px;background:rgba(124,106,247,.1);color:#a5b4fc;border:1px solid rgba(124,106,247,.2)}

/* Footer */
.cf{border-top:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* Scope */
.scope{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.sc-solo{background:rgba(34,211,238,.08);color:#22d3ee;border:1px solid rgba(34,211,238,.18)}
.sc-team{background:rgba(74,222,128,.08);color:#4ade80;border:1px solid rgba(74,222,128,.18)}
.sc-both{background:rgba(251,191,36,.08);color:#fbbf24;border:1px solid rgba(251,191,36,.18)}

/* Tool badges */
.tools{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.tool{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;display:flex;align-items:center;gap:3px}
.tool-none{color:var(--muted);background:var(--s2);border:1px solid var(--border);font-weight:400;font-style:italic}
/* Tool-specific colors */
.t-figma    {background:rgba(242,78,30,.15);   color:#f77f5a;border:1px solid rgba(242,78,30,.25)}
.t-github   {background:rgba(110,64,201,.15);  color:#9d7fe8;border:1px solid rgba(110,64,201,.25)}
.t-blender  {background:rgba(234,118,0,.15);   color:#f9a640;border:1px solid rgba(234,118,0,.25)}
.t-houdini  {background:rgba(255,71,19,.15);   color:#ff7a52;border:1px solid rgba(255,71,19,.25)}
.t-slack    {background:rgba(74,21,75,.3);     color:#c084fc;border:1px solid rgba(74,21,75,.5)}
.t-python   {background:rgba(55,118,171,.15);  color:#60a5fa;border:1px solid rgba(55,118,171,.25)}
.t-eslint   {background:rgba(75,50,195,.15);   color:#818cf8;border:1px solid rgba(75,50,195,.25)}
.t-prettier {background:rgba(234,88,12,.15);   color:#fb923c;border:1px solid rgba(234,88,12,.25)}
.t-tailwind {background:rgba(6,182,212,.15);   color:#22d3ee;border:1px solid rgba(6,182,212,.25)}
.t-storybook{background:rgba(255,71,133,.15);  color:#f472b6;border:1px solid rgba(255,71,133,.25)}
.t-ue5      {background:rgba(0,0,0,.4);        color:#94a3b8;border:1px solid #334155}
.t-airtable {background:rgba(18,165,148,.15);  color:#2dd4bf;border:1px solid rgba(18,165,148,.25)}
.t-chromatic{background:rgba(255,71,133,.15);  color:#f472b6;border:1px solid rgba(255,71,133,.25)}
.t-imagemagick{background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid rgba(100,116,139,.25)}
.t-web      {background:rgba(16,185,129,.15);  color:#34d399;border:1px solid rgba(16,185,129,.25)}

/* Source link */
.src{margin-left:auto;font-size:10px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:3px;white-space:nowrap;padding:2px 7px;border-radius:6px;border:1px solid var(--border);transition:all .15s}
.src:hover{color:var(--text);border-color:var(--accent);background:rgba(124,106,247,.08)}

/* NEW badge */
.nbadge{font-size:9px;font-weight:800;background:var(--accent);color:#fff;padding:1px 5px;border-radius:5px;letter-spacing:.05em}

/* Date chip */
.datechip{font-size:10px;color:var(--muted)}

/* Loader */
.loader{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.ld{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin:0 3px;animation:bo 1.2s infinite}
.ld:nth-child(2){animation-delay:.2s}.ld:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
</style>
</head>

// ── Render ─────────────────────────────────────────────────────────────────
const feed = document.getElementById('feed');
const loader = document.getElementById('loader');
let filter = 'all', page = 0;
const PER_PAGE = 12;

function toolBadge(name) {
  const cls = TOOL_CLASS[name] || 't-web';
  const icon = TOOL_ICON[name] || '🔧';
  return `<span class="tool ${cls}">${icon} ${name}</span>`;
}

function renderCard(c) {
  const cat = CAT[c.cat];
  const sc  = SCOPE_CFG[c.scope] || SCOPE_CFG.solo;

  const content = c.code
    ? `<div class="code">${esc(c.code)}</div>`
    : c.items
      ? `<ul class="blist">${c.items.map(i=>`<li>${i}</li>`).join('')}</ul>`
      : '';

  const toolsHtml = c.tools && c.tools.length
    ? c.tools.map(toolBadge).join('')
    : `<span class="tool tool-none">単体</span>`;

  const srcHtml = c.src
    ? (c.src.url
        ? `<a class="src" href="${c.src.url}" target="_blank" rel="noopener">↗ ${c.src.label}</a>`
        : `<span class="src">📄 ${c.src.label}</span>`)
    : '';

  const impactHtml = c.impact && c.impact.length
    ? `<div class="impacts">${c.impact.map(i=>`<span class="imp">${i}</span>`).join('')}</div>`
    : '';

  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.cat = c.cat;
  el.innerHTML = `
    <div class="ch">
      <div class="icon-wrap ${cat.ic}">${cat.icon}</div>
      <div class="ch-right">
        <div class="cat-label ${cat.cl}">${cat.label}${c.isNew ? ' <span class="nbadge">NEW</span>' : ''}</div>
        <div class="card-title">${c.title}</div>
      </div>
      <span class="datechip">${c.date}</span>
    </div>
    <div class="cd"></div>
    <div class="cb">
      <p class="desc">${c.desc}</p>
      ${content}
      ${impactHtml}
      <div class="cf">
        <span class="scope ${sc.cls}">${sc.label}</span>
        <div class="tools">${toolsHtml}</div>
        ${srcHtml}
      </div>
    </div>`;
  return el;
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function filtered(){ return filter==='all' ? CARDS : CARDS.filter(c=>c.cat===filter) }

function loadMore(){
  const list = filtered();
  const slice = list.slice(page*PER_PAGE, (page+1)*PER_PAGE);
  if(!slice.length){ loader.style.display='none'; return; }
  slice.forEach(c => feed.appendChild(renderCard(c)));
  page++;
  if(page*PER_PAGE >= list.length){
    page=0;
    CARDS.forEach(c=>{ const d=new Date(c.date); d.setDate(d.getDate()-28); c.date=d.toISOString().slice(0,10); c.isNew=false; });
  }
}

new IntersectionObserver(e=>{ if(e[0].isIntersecting) loadMore() },{threshold:.1}).observe(loader);

document.getElementById('filters').addEventListener('click', e=>{
  const btn = e.target.closest('.fb');
  if(!btn) return;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  filter = btn.dataset.f;
  feed.innerHTML=''; page=0; loader.style.display='';
  loadMore();
});
</script>
